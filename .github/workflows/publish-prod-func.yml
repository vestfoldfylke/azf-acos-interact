# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js project to Azure Function App - PROD

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy-az-app-service-node:
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'release' && github.event.release.target_commitish == 'main')
    uses: vestfoldfylke/shared/.github/workflows/deploy-az-app-service-node.yml@main
    with:
      azure_appname: "vfkplzacosacosfunc" # required
      azure_functionapp_package_path: "." # required
      audit_severity: "high" # this one is optional and defaults to "moderate" if not set. Can be one of (null, info, low, moderate, high, critical, none)
    secrets:
      azure_publishprofile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_PROD }} # required

