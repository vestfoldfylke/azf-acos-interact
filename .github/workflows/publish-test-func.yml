# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js project to Azure Function App - TEST

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-az-app-service-node:
    uses: vestfoldfylke/shared/.github/workflows/deploy-az-app-service-node.yml@main
    with:
      azure_appname: "vfkdlzacosacosfunc" # required
      azure_functionapp_package_path: "." # required
      audit_severity: "high" # this one is optional and defaults to "moderate" if not set. Can be one of (null, info, low, moderate, high, critical, none)
    secrets:
      azure_publishprofile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_DEV }} # required


